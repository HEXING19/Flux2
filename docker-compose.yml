services:
  flux:
    build: .
    container_name: flux-xdr
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      - PYTHONPATH=/app/backend
      - APP_ENV=prod
      - MOCK_MODE=true
      - DB_PATH=/app/data/flux.db
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
